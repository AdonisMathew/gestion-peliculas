<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Películas</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <!-- Pantalla de autenticación -->
    <div id="auth-screen">
      <div class="auth-box">
        <h1>Gestión de Películas</h1>

        <div class="auth-tabs">
          <button id="tab-login" class="tab-active">Iniciar sesión</button>
          <button id="tab-register">Registrarse</button>
        </div>

        <form id="login-form" class="auth-form">
          <input type="email" id="login-email" placeholder="Email" required />
          <input type="password" id="login-password" placeholder="Contraseña" required />
          <button type="submit">Ingresar</button>
        </form>

        <form id="register-form" class="auth-form" style="display:none">
          <input type="text" id="register-name" placeholder="Nombre" required />
          <input type="email" id="register-email" placeholder="Email" required />
          <input type="password" id="register-password" placeholder="Contraseña (mínimo 6 caracteres)" required />
          <button type="submit">Crear cuenta</button>
        </form>
      </div>
    </div>

    <!-- App principal (oculta hasta iniciar sesión) -->
    <div id="app" style="display:none">
      <header class="app-header">
        <h1>Gestión de Películas</h1>
        <div class="user-info">
          <span id="user-name-display"></span>
          <button id="btn-logout">Cerrar sesión</button>
        </div>
      </header>

      <section id="seccion-generos">
        <h2>Géneros</h2>
        <form id="genre-form">
          <input type="text" id="genre-name" placeholder="Nombre del género" />
          <button type="submit">Agregar Género</button>
        </form>
        <ul id="lista-generos"></ul>
      </section>

      <section id="seccion-peliculas">
        <h2>Películas</h2>
        <form id="movie-form">
          <input type="text" id="movie-title" placeholder="Título" />
          <input type="text" id="movie-director" placeholder="Director" />
          <input type="number" id="movie-year" placeholder="Año" />
          <input type="number" id="movie-duration" placeholder="Duración (minutos)" />
          <select id="movie-genre">
            <option value="">Seleccioná un género</option>
          </select>
          <input type="hidden" id="editing-id" value="" />
          <button type="submit" id="btn-movie">Agregar Película</button>
          <button type="button" id="btn-cancelar" style="display:none">Cancelar</button>
        </form>

        <table>
          <thead>
            <tr>
              <th>Título</th>
              <th>Director</th>
              <th>Año</th>
              <th>Duración</th>
              <th>Género</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tabla-peliculas"></tbody>
        </table>
      </section>
    </div>

    <div id="mensaje"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
